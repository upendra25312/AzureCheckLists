name: Security CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Audit root dependencies
        run: npm audit --audit-level=critical

      - name: Install API dependencies
        run: npm ci
        working-directory: ./api

      - name: Audit API dependencies
        run: npm audit --audit-level=critical
        working-directory: ./api

  smoke-tests:
    name: API and export build smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dashboard repo
        uses: actions/checkout@v6

      - name: Checkout Azure review-checklists source
        uses: actions/checkout@v6
        with:
          repository: Azure/review-checklists
          path: source-repo

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install API dependencies
        run: npm ci
        working-directory: ./api

      - name: Run API tests
        run: npm run test:api

      - name: Build static export
        env:
          REVIEW_CHECKLISTS_SOURCE_DIR: ./source-repo
        run: npm run build
