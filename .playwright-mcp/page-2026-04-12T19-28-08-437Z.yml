      - generic [ref=e103]:
        - generic [ref=e104]:
          - generic [ref=e105]:
            - figure [ref=e107]:
              - img "Betsy Sallee" [ref=e109]
            - paragraph [ref=e111]: Betsy Sallee
          - generic [ref=e112]:
            - figure [ref=e114]:
              - img "Margot Lepizzera" [ref=e116]
            - paragraph [ref=e118]: Margot Lepizzera
        - generic [ref=e119]:
          - paragraph [ref=e120]:
            - text: Testing within the CI/CD pipeline, also known as
            - link "shift-left testing" [ref=e121] [cursor=pointer]:
              - /url: https://www.datadoghq.com/blog/shift-left-testing-best-practices/
            - text: ", is a devops best practice that enables agile teams to continually assess the viability of new features at every stage of the development process. Running tests early and often makes it easier to catch issues before they impact your users, reduce technical debt, and foster efficient, cross-team collaboration."
          - paragraph [ref=e122]:
            - link "Datadog Synthetic CI/CD Testing" [ref=e123] [cursor=pointer]:
              - /url: https://docs.datadoghq.com/synthetics/ci/?tab=npm
            - text: offers a flexible approach to shift-left testing that allows you to incorporate your existing Datadog Synthetic tests at any point in your CI/CD pipeline, so you can maintain a positive user experience and minimize downtime. You can use a single Synthetic test suite for a range of testing scenarios—including canary testing and testing in your CI environment—which eliminates the need for environment-specific tests. Your scheduled tests will still run against your production environment as expected, but you’ll be able to run those same tests—with whatever adjustments you see fit—on demand and at every stage of the development process.
          - heading "Run Synthetic tests in your CI pipeline for earlier issue detection" [level=2] [ref=e124]:
            - link "Run Synthetic tests in your CI pipeline for earlier issue detection" [ref=e125] [cursor=pointer]:
              - /url: "#run-synthetic-tests-in-your-ci-pipeline-for-earlier-issue-detection"
          - paragraph [ref=e126]:
            - text: The rise in popularity of the
            - link "agile development methodology" [ref=e127] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Agile_software_development
            - text: has made continuous integration testing crucial to the preservation of a healthy production environment. Agile teams frequently deploy new features and application improvements, so it’s critical for companies to ensure that these rapid deployments do not introduce regressions. Tests that are run within the CI pipeline must therefore reliably verify that code changes have not degraded the user experience—without impeding the team’s ability to ship changes quickly.
          - paragraph [ref=e128]:
            - text: Traditionally, end-to-end tests have been too brittle and slow to be run in the CI pipelines of teams that ship code on a daily basis. Datadog Synthetic tests, however, are designed with
            - link "reliability" [ref=e129] [cursor=pointer]:
              - /url: https://www.datadoghq.com/blog/test-maintenance-best-practices/#reduce-test-flakiness-with-reliable-locators-and-alerts
            - text: and efficiency in mind. Synthetic tests automatically update in response to UI changes and employ a wait and retry mechanism to ensure that failures are legitimate. And because Synthetic CI/CD Testing runs tests simultaneously rather than sequentially, it won’t slow down your development process.
          - paragraph [ref=e130]:
            - text: Datadog’s integrations with popular CI tools such as
            - link "GitLab" [ref=e131] [cursor=pointer]:
              - /url: https://docs.datadoghq.com/integrations/gitlab
            - text: ","
            - link "Jenkins" [ref=e132] [cursor=pointer]:
              - /url: https://docs.datadoghq.com/integrations/jenkins
            - text: ", and"
            - link "Azure DevOps" [ref=e133] [cursor=pointer]:
              - /url: https://docs.datadoghq.com/integrations/azure_devops
            - text: already allow you to collect events from your pipelines within the Datadog platform. Synthetic CI/CD Testing takes it a step further by enabling you to incorporate Synthetic tests in your CI pipelines for earlier issue detection. You can even view the results of Synthetic CI test runs directly within your CI, as shown in the following screenshot.
          - figure "Visualize your test results in your CI/CD platform." [ref=e136]:
            - img "Visualize your test results in your CI/CD platform." [ref=e138]
            - generic [ref=e139]: Visualize your test results in your CI/CD platform.
          - paragraph [ref=e140]:
            - text: Adding Synthetic tests to your existing workflow is seamless. You can either
            - link "send requests to a trigger endpoint and a polling endpoint" [ref=e141] [cursor=pointer]:
              - /url: https://docs.datadoghq.com/synthetics/ci/?tab=npm#api-usage
            - text: or
            - link "install an npm package and use the associated CLI" [ref=e142] [cursor=pointer]:
              - /url: https://docs.datadoghq.com/synthetics/ci/?tab=npm#cli-usage
            - text: as part of your CI build process. The CLI will autodiscover the tests to run in your repositories, execute the tests, and retrieve their results, blocking the deployment pipeline if key Synthetic tests fail in the CI environment. This helps prevent breaking changes from reaching staging or production—and safeguards the core functionality of your application by creating a safety net that only lets viable code progress through the pipeline.
          - figure "Configure execution rules to block breaking changes from reaching production." [ref=e145]:
            - img "Configure execution rules to block breaking changes from reaching production." [ref=e147]
            - generic [ref=e148]: Configure execution rules to block breaking changes from reaching production.
          - paragraph [ref=e149]:
            - text: This same CLI tool can be used to upload your frontend JavaScript source maps, which makes the frontend errors you collect with Datadog RUM more meaningful. For example, you will be able to use
            - link "Error Tracking" [ref=e150] [cursor=pointer]:
              - /url: /blog/error-tracking
            - text: to investigate when an error first occurred, which line of code fired it, and whether the latest release fixed it.
          - heading "Run Synthetic tests on deployment to ensure safe releases" [level=2] [ref=e151]:
            - link "Run Synthetic tests on deployment to ensure safe releases" [ref=e152] [cursor=pointer]:
              - /url: "#run-synthetic-tests-on-deployment-to-ensure-safe-releases"
          - paragraph [ref=e153]: In addition to running Synthetic tests throughout the development cycle, you can also use Datadog Synthetic CI/CD Testing to execute tests as part of your CD process. Evaluating the state of your production application immediately after a deployment finishes enables you to detect potential regressions that could impact your users—and automatically trigger a rollback whenever a critical test fails. This capability is particularly useful for highly agile development teams that want to both own features from development to production and deploy frequently without risking extended downtime.
          - paragraph [ref=e154]:
            - text: Synthetic CI/CD Testing can be utilized as an automatic safety measure in your
            - link "canary deployments" [ref=e155] [cursor=pointer]:
              - /url: https://dev.to/mostlyjason/intro-to-deployment-strategies-blue-green-canary-and-more-3a3
            - text: . If, for instance, you’ve deployed a new feature to a subset of users in a particular location, you can run your Synthetic tests against production in that location immediately after your changes go live. You can then use the API polling endpoint to send the results of your tests to a custom webhook, which, in the event of a failure, will trigger an automated rollback in order to revert to the most recent stable state.
          - heading "Use a single, customizable test suite for every environment" [level=2] [ref=e156]:
            - link "Use a single, customizable test suite for every environment" [ref=e157] [cursor=pointer]:
              - /url: "#use-a-single-customizable-test-suite-for-every-environment"
          - paragraph [ref=e158]: Datadog Synthetic CI/CD Testing abstracts tests from their parameters, enabling you to leverage your existing, production-level test suite within your CI/CD pipeline, as well as within any environment that requires authentication or direct access to a network. The flexible nature of these Synthetic tests breaks down the silos between development, operations, QA, and product teams by eliminating the need to maintain separate testing scenarios for each stage of development. Simply create a test suite once, and tailor it for every use case.
          - paragraph [ref=e159]:
            - text: By default, Synthetic tests that are triggered through Synthetic CI/CD Testing will run according to the same configuration that they have on production. You can, however, specify overrides in order to meet the particular needs of each environment. This can be done for your entire test suite within a global configuration file (as demonstrated in the
            - code [ref=e160]: global
            - text: section of the following code snippet) or at the individual test level.
          - figure [ref=e162]:
