          - paragraph [ref=e208]:
            - text: For example, if your testing environment is behind a proxy or basic auth system, you can use overrides to add that specificity to your CI tests without overcomplicating your production-level tests. You can also use environment variables to dynamically configure an override value for your tests’
            - code [ref=e209]: startUrl
            - text: . If, for instance, your pipeline generates a static hash for staging purposes whenever an engineer opens a PR, that static hash can be dynamically incorporated into the
            - code [ref=e210]: startUrl
            - text: parameter, as shown above. For a complete list of customizable parameters, review the
            - link "documentation" [ref=e211] [cursor=pointer]:
              - /url: https://docs.datadoghq.com/synthetics/ci/?tab=npm#configure-tests
            - text: .
          - heading "Shift system-wide troubleshooting to the left" [level=2] [ref=e212]:
            - link "Shift system-wide troubleshooting to the left" [ref=e213] [cursor=pointer]:
              - /url: "#shift-system-wide-troubleshooting-to-the-left"
          - paragraph [ref=e214]:
            - text: Whenever an issue is surfaced by a Synthetic test, it’s important for users to be able to easily troubleshoot it, regardless of the environment in which the test was run or where the issue originates within the stack.
            - link "Datadog Synthetic Monitoring" [ref=e215] [cursor=pointer]:
              - /url: https://www.datadoghq.com/blog/introducing-synthetic-monitoring/
            - text: enables you to view test results from every environment—along with a wealth of contextual data—in the Datadog UI.
          - figure "View test results from every environment in the Datadog UI." [ref=e218]:
            - img "View test results from every environment in the Datadog UI." [ref=e220]
            - generic [ref=e221]: View test results from every environment in the Datadog UI.
          - paragraph [ref=e222]:
            - text: Tests that are run in the CI/CD pipeline have the same level of context as your production-level test runs, so you can use relevant error messages, resources, and screenshots to pinpoint the precise point of failure at any stage of the development cycle. And because Synthetic Monitoring is tightly coupled with
            - link "APM" [ref=e223] [cursor=pointer]:
              - /url: https://www.datadoghq.com/product/apm/
            - text: ", each test run is automatically correlated with metrics, traces, and logs from your application and infrastructure, enabling you to conduct efficient investigations without switching contexts."
          - figure "View metrics, traces, and logs that are relevant to each test." [ref=e226]:
            - img "View metrics, traces, and logs that are relevant to each test." [ref=e228]
            - generic [ref=e229]: View metrics, traces, and logs that are relevant to each test.
          - paragraph [ref=e230]:
            - text: You can also visualize CI/CD test results in the context of their job executions in the
            - link "CI Results Explorer" [ref=e231] [cursor=pointer]:
              - /url: https://app.datadoghq.com/synthetics/explorer/ci
            - text: ", along with test batch statuses and average batch duration over time. This view can be filtered by facets that are relevant to the CI environment, such as"
            - code [ref=e232]: branch
            - text: and
            - code [ref=e233]: commit sha
            - text: ", which makes it easy to focus your investigation on the job executions you care about. The CI Results Explorer also allows you to dive into any test batch in a single click in order to monitor the progress of individual test runs, identify failures, and compare results across different browsers, devices, and locations."
          - figure "The CI Results Explorer displays all test batches that are executed in the CI/CD pipeline." [ref=e236]:
            - img "The CI Results Explorer displays CI/CD test results in the context of their job executions." [ref=e238]
            - generic [ref=e239]: The CI Results Explorer displays all test batches that are executed in the CI/CD pipeline.
          - heading "Get started with Synthetic CI/CD Testing" [level=2] [ref=e240]:
            - link "Get started with Synthetic CI/CD Testing" [ref=e241] [cursor=pointer]:
              - /url: "#get-started-with-synthetic-cicd-testing"
          - paragraph [ref=e242]:
            - text: Datadog Synthetic CI/CD Testing allows you to leverage the power of your existing Synthetic test suite at any point in your CI/CD pipeline, so you can catch issues early, run safe deployments, and provide the best possible experience to your users. If you’re already a Datadog customer and you would like more information about how to extend the power of Datadog Synthetic tests to your CI/CD pipeline, check out the
            - link "documentation" [ref=e243] [cursor=pointer]:
              - /url: https://docs.datadoghq.com/synthetics/ci/?tab=npm
            - text: . New to Datadog? Get started with a
            - link "14-day free trial" [ref=e244] [cursor=pointer]:
              - /url: "#"
            - text: .
